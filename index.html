<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ristoflow Hotel</title>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Tony topbar */
    .tony-topbar-btn {
      display:flex;align-items:center;gap:6px;
      background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
      color:white;padding:6px 14px;border-radius:20px;cursor:pointer;
      font-size:13px;font-weight:600;transition:background .15s;
    }
    .tony-topbar-btn:hover { background:rgba(255,255,255,.25); }
    .tony-topbar-badge { background:#ef4444;color:white;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center; }

    /* Panel Tony */
    #tony-panel {
      position:fixed;top:56px;right:16px;width:380px;max-width:calc(100vw - 32px);
      background:white;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.2);
      z-index:9000;display:none;flex-direction:column;max-height:calc(100vh - 80px);
      border:1px solid #e5e7eb;overflow:hidden;
    }
    #tony-panel.open { display:flex; }
    .tony-panel-header { background:linear-gradient(135deg,#0E5A7A,#1a7a9f);color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0; }
    .tony-panel-avatar { width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0; }
    .tony-panel-msgs { flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:200px; }
    .tony-msg { padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;max-width:85%; }
    .tony-msg.tony { background:#f0f9ff;color:#0f172a;align-self:flex-start;border-bottom-left-radius:4px; }
    .tony-msg.user { background:#0E5A7A;color:white;align-self:flex-end;border-bottom-right-radius:4px; }
    .tony-panel-sugg { padding:0 14px 10px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0; }
    .tony-sugg-btn { background:#f0f9ff;color:#0E5A7A;border:1px solid #bae6fd;padding:4px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600; }
    .tony-panel-input { padding:12px 14px;border-top:1px solid #f1f5f9;display:flex;gap:8px;flex-shrink:0; }
    .tony-panel-input input { flex:1;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px; }
    .tony-panel-input button { background:#0E5A7A;color:white;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px; }
    .tony-panel-footer { padding:8px 14px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;flex-shrink:0; }
    .tony-panel-footer button { background:none;border:none;font-size:12px;color:#64748b;cursor:pointer;padding:4px 8px;border-radius:6px; }
    .tony-panel-footer button:hover { background:#f1f5f9; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar" id="topbar" style="display:none;">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <img src="assets/favicon.png" class="topbar-logo" onerror="this.style.display='none'">
        <span class="topbar-title">Hotel</span>
      </div>
      <div class="topbar-right" style="display:flex;align-items:center;gap:10px;">
        <span id="topbar-azienda" class="topbar-azienda"></span>
        <!-- TONY BUTTON -->
        <button class="tony-topbar-btn" id="btn-tony-topbar">
          🤖 Tony
        </button>
        <button class="topbar-btn" id="btn-logout">Esci</button>
      </div>
    </div>
  </div>

  <!-- TONY PANEL -->
  <div id="tony-panel">
    <div class="tony-panel-header">
      <div class="tony-panel-avatar">🤖</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;">Tony — Assistente Hotel</div>
        <div style="font-size:11px;opacity:.8;" id="tony-panel-status">AI operativa · conosce la tua struttura</div>
      </div>
      <button id="btn-chiudi-tony" style="background:rgba(255,255,255,.2);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;">✕</button>
    </div>
    <div class="tony-panel-msgs" id="tony-panel-msgs">
      <div class="tony-msg tony" id="tony-init-msg">⏳ Caricamento contesto...</div>
    </div>
    <div class="tony-panel-sugg" id="tony-panel-sugg"></div>
    <div class="tony-panel-input">
      <input id="tony-panel-input" placeholder="Chiedi qualcosa..." />
      <button id="tony-panel-send">➤</button>
    </div>
    <div class="tony-panel-footer">
      <button id="tony-mem-btn">🧠 Memoria</button>
      <button id="tony-clear-btn">🗑 Pulisci chat</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="app-shell" id="app-shell" style="display:none;">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-menu" id="sidebar-menu"></div>
    </nav>
    <main class="main-content" id="app"></main>
  </div>

  <!-- LOGIN (no sidebar) -->
  <div id="app-login"></div>

  <script type="module" src="js/router.js"></script>

  <!-- TONY GLOBAL SCRIPT -->
  <script type="module">
    import { supabase } from './js/supabaseClient.js';

    const EDGE_URL = 'https://cuhcscpvhypoaplcmtjk.supabase.co/functions/v1/assistente-ai';

    let tonyHistory  = [];
    let tonyContesto = '';
    let tonyInited   = false;

    // Toggle panel
    document.getElementById('btn-tony-topbar').onclick = async () => {
      const panel = document.getElementById('tony-panel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open') && !tonyInited) {
        await initTonyContesto();
        tonyInited = true;
      }
    };
    document.getElementById('btn-chiudi-tony').onclick = () => {
      document.getElementById('tony-panel').classList.remove('open');
    };

    // Chiudi cliccando fuori
    document.addEventListener('click', e => {
      const panel = document.getElementById('tony-panel');
      const btn   = document.getElementById('btn-tony-topbar');
      if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('open');
      }
    });

    async function initTonyContesto() {
      const az        = window.state?.azienda;
      const aziendaId = az?.id;
      if (!aziendaId) return;

      const oggi = new Date().toISOString().split('T')[0];
      document.getElementById('tony-panel-status').textContent = 'Caricamento dati...';

      const [
        { data: prenotazioni },
        { data: task },
        { data: memoria },
        { data: kb },
        { data: camere },
      ] = await Promise.all([
        supabase.from('hotel_prenotazioni')
          .select('ospite_nome,ospite_cognome,data_checkin,data_checkout,stato,hotel_camere(nome),adulti,bambini,note_ospite')
          .eq('azienda_id', aziendaId)
          .not('stato','in','(cancellata,noshow)')
          .gte('data_checkout', oggi)
          .lte('data_checkin', new Date(new Date(oggi).getTime()+7*864e5).toISOString().split('T')[0]),
        supabase.from('hotel_operations_task')
          .select('nome,tipo,stato,priorita,camera_numero,assegnato_nome')
          .eq('azienda_id', aziendaId).eq('data', oggi),
        supabase.from('tony_memoria')
          .select('contenuto,categoria').eq('azienda_id', aziendaId)
          .order('created_at',{ascending:false}).limit(15),
        supabase.from('tony_knowledge_base')
          .select('titolo,contenuto').in('categoria',['piattaforma','hotel']).limit(20),
        supabase.from('hotel_camere')
          .select('id,nome,tipologia,attiva').eq('azienda_id', aziendaId),
      ]);

      const oggi_arr  = (prenotazioni||[]).filter(p=>p.data_checkin===oggi);
      const oggi_dep  = (prenotazioni||[]).filter(p=>p.data_checkout===oggi);
      const in_casa   = (prenotazioni||[]).filter(p=>p.data_checkin<oggi&&p.data_checkout>oggi);
      const task_pend = (task||[]).filter(t=>t.stato==='da_fare'||t.stato==='in_corso');
      const task_done = (task||[]).filter(t=>t.stato==='fatto');
      const cam_attive= (camere||[]).filter(c=>c.attiva);

      const ora = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

      tonyContesto = `Sei Tony, l'assistente AI operativo di ${az?.nome||'questo hotel'}.
Oggi è ${new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}, ore ${ora}.

STRUTTURA:
- ${cam_attive.length} camere attive
- Tipologie: ${[...new Set(cam_attive.map(c=>c.tipologia).filter(Boolean))].join(', ')||'non specificate'}

SITUAZIONE OGGI:
- Arrivi: ${oggi_arr.length}${oggi_arr.length?': '+oggi_arr.map(p=>`${p.ospite_nome} ${p.ospite_cognome||''} (${p.hotel_camere?.nome||'?'}, ${p.adulti} adulti)`).join(' | '):''}
- Partenze: ${oggi_dep.length}${oggi_dep.length?': '+oggi_dep.map(p=>`${p.ospite_nome} ${p.ospite_cognome||''}`).join(', '):''}
- In casa: ${in_casa.length} ospiti
- Task operativi: ${task_pend.length} in sospeso, ${task_done.length} completati
${task_pend.length?'- Task da fare: '+task_pend.slice(0,5).map(t=>`${t.nome} (${t.camera_numero||'generale'}, ${t.assegnato_nome||'non assegnato'})`).join('; '):''}

PROSSIMI 7 GIORNI:
${(prenotazioni||[]).filter(p=>p.data_checkin>oggi).slice(0,6).map(p=>`- ${p.data_checkin}: ${p.ospite_nome} ${p.ospite_cognome||''} (${p.hotel_camere?.nome||'?'}, ${p.adulti} adulti)`).join('\n')||'- Nessuna prenotazione futura imminente'}

${(memoria||[]).length?'NOTE DELL\'ADMIN (memoria):\n'+(memoria||[]).map(m=>`- ${m.contenuto}`).join('\n'):''}
${(kb||[]).length?'\nCONOSCENZE:\n'+(kb||[]).slice(0,8).map(k=>`- ${k.titolo}: ${(k.contenuto||'').substring(0,120)}`).join('\n'):''}

Rispondi in italiano, in modo conciso e operativo. Dai priorità alle informazioni di oggi. Suggerisci azioni concrete quando utile.`;

      // Messaggio benvenuto
      let benvenuto = '👋 Ciao! Come posso aiutarti?';
      const parti = [];
      if (oggi_arr.length)  parti.push(`${oggi_arr.length} arriv${oggi_arr.length===1?'o':'i'}`);
      if (oggi_dep.length)  parti.push(`${oggi_dep.length} partenz${oggi_dep.length===1?'a':'e'}`);
      if (task_pend.length) parti.push(`${task_pend.length} task in sospeso`);
      if (parti.length) benvenuto = `👋 Oggi: ${parti.join(', ')}. Come posso aiutarti?`;

      document.getElementById('tony-init-msg').textContent = benvenuto;
      document.getElementById('tony-panel-status').textContent = 'AI operativa · aggiornato ora';

      // Suggerimenti contestuali
      const sugg = [];
      if (oggi_arr.length)  sugg.push('Chi arriva oggi?');
      if (oggi_dep.length)  sugg.push('Chi parte oggi?');
      if (task_pend.length) sugg.push('Task in sospeso');
      sugg.push('Occupazione settimana');
      if (sugg.length < 4)  sugg.push('Suggerimenti operativi');

      document.getElementById('tony-panel-sugg').innerHTML = sugg.slice(0,4).map(s =>
        `<button class="tony-sugg-btn">${s}</button>`
      ).join('');

      document.querySelectorAll('.tony-sugg-btn').forEach(btn => {
        btn.onclick = () => inviaTony(btn.textContent);
      });
    }

    async function inviaTony(testo) {
      if (!testo?.trim()) return;
      const input = document.getElementById('tony-panel-input');
      input.value = '';

      aggiungiMsg(testo, 'user');
      tonyHistory.push({ role:'user', content: testo });

      const loadId = 'tl-' + Date.now();
      const msgs = document.getElementById('tony-panel-msgs');
      msgs.innerHTML += `<div class="tony-msg tony" id="${loadId}">⏳</div>`;
      msgs.scrollTop = msgs.scrollHeight;

      try {
        const { data: { session } } = await supabase.auth.getSession();
        const token = session?.access_token;

        const res = await fetch(EDGE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({
            azienda_id: window.state?.azienda?.id,
            messaggio:  testo,
            history:    tonyHistory.slice(-8),
            system:     tonyContesto,
          }),
        });

        const data = await res.json();
        const risposta = data.risposta || data.content?.[0]?.text || data.error || 'Nessuna risposta';

        document.getElementById(loadId)?.remove();
        tonyHistory.push({ role:'assistant', content: risposta });
        aggiungiMsg(risposta, 'tony');

        // Salva memoria automatica
        const az = window.state?.azienda;
        if (az && /ricorda|tieni a mente|nota che|importante:/i.test(testo)) {
          await supabase.from('tony_memoria').insert({
            azienda_id: az.id,
            contenuto:  testo,
            categoria:  'hotel',
            fonte:      'chat_topbar',
          });
        }
      } catch(e) {
        document.getElementById(loadId)?.remove();
        aggiungiMsg('Errore di connessione. Riprova.', 'tony');
      }
    }

    function aggiungiMsg(testo, tipo) {
      const msgs = document.getElementById('tony-panel-msgs');
      const div  = document.createElement('div');
      div.className = `tony-msg ${tipo}`;
      div.textContent = testo;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // Input
    document.getElementById('tony-panel-send').onclick = () => inviaTony(document.getElementById('tony-panel-input').value);
    document.getElementById('tony-panel-input').onkeydown = e => {
      if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); inviaTony(e.target.value); }
    };

    // Pulisci chat
    document.getElementById('tony-clear-btn').onclick = () => {
      tonyHistory = [];
      const msgs = document.getElementById('tony-panel-msgs');
      msgs.innerHTML = '<div class="tony-msg tony">Chat pulita. Come posso aiutarti?</div>';
    };

    // Memoria
    document.getElementById('tony-mem-btn').onclick = async () => {
      const az = window.state?.azienda;
      if (!az) return;
      const { data: memoria } = await supabase.from('tony_memoria')
        .select('*').eq('azienda_id', az.id)
        .order('created_at',{ascending:false}).limit(20);

      document.getElementById('tony-modal-mem')?.remove();
      const modal = document.createElement('div');
      modal.id = 'tony-modal-mem';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px;';
      modal.innerHTML = `
        <div style="background:white;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div style="font-size:16px;font-weight:800;">🧠 Memoria Tony Hotel</div>
            <button id="chiudi-mem-tony" style="background:#f1f5f9;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;">✕</button>
          </div>
          <div style="font-size:12px;color:#64748b;margin-bottom:12px;">Di' "ricorda che..." per salvare nuove note.</div>
          ${!(memoria?.length) ? '<div style="color:#94a3b8;font-size:13px;">Nessuna memoria salvata.</div>' :
            memoria.map(m => `
              <div style="background:#f8fafc;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                <div>
                  <div style="font-size:13px;">${m.contenuto?.replace(/</g,'&lt;')}</div>
                  <div style="font-size:11px;color:#94a3b8;margin-top:3px;">${new Date(m.created_at).toLocaleDateString('it-IT')}</div>
                </div>
                <button data-del="${m.id}" style="background:#fee2e2;border:none;width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:11px;color:#dc2626;flex-shrink:0;">✕</button>
              </div>
            `).join('')
          }
        </div>
      `;
      document.body.appendChild(modal);
      modal.onclick = e => { if(e.target===modal) modal.remove(); };
      modal.querySelector('#chiudi-mem-tony').onclick = () => modal.remove();
      modal.querySelectorAll('[data-del]').forEach(btn => {
        btn.onclick = async () => {
          await supabase.from('tony_memoria').delete().eq('id', btn.dataset.del);
          btn.closest('div[style]').remove();
        };
      });
    };
  </script>
</body>
</html>
