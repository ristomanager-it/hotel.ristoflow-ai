<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>La tua prenotazione</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1B4F72;--primary-l:#2471A3;--accent:#C9A84C;
  --bg:#F4F6F9;--border:#E2E8F0;--text:#1A202C;--muted:#64748B;
  --ok:#16A34A;--err:#DC2626;--warn:#D97706;--radius:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* HERO */
.hero{background:linear-gradient(135deg,var(--primary),var(--primary-l));padding:28px 20px 40px;text-align:center;color:white;position:relative;}
.hero-logo{width:56px;height:56px;border-radius:14px;object-fit:cover;margin:0 auto 12px;display:block;border:2px solid rgba(255,255,255,.3);}
.hero h1{font-size:21px;font-weight:800;margin-bottom:4px;}
.hero p{opacity:.8;font-size:13px;}

/* STATO BADGE */
.stato-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:12px;}
.stato-confermata{background:rgba(22,163,74,.2);color:#dcfce7;}
.stato-in_attesa{background:rgba(217,119,6,.2);color:#fef3c7;}
.stato-annullata{background:rgba(220,38,38,.2);color:#fee2e2;}
.stato-checkin{background:rgba(37,99,235,.2);color:#dbeafe;}
.stato-checkout{background:rgba(100,116,139,.2);color:#f1f5f9;}

/* CONTAINER */
.container{max-width:560px;margin:-20px auto 0;padding:0 16px 80px;position:relative;z-index:1;}

/* CARD */
.card{background:white;border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.07);border:1px solid var(--border);}
.card-title{font-size:13px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px;}

/* SOGGIORNO BOX */
.soggiorno-box{background:linear-gradient(135deg,#EBF5FB,#f0f9ff);border-radius:12px;padding:16px;margin-bottom:16px;}
.soggiorno-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:13px;}
.soggiorno-row span:first-child{color:var(--muted);}
.soggiorno-row span:last-child{font-weight:700;color:var(--text);}
.soggiorno-notti{text-align:center;padding:12px;background:var(--primary);color:white;border-radius:10px;margin-top:10px;}
.soggiorno-notti .n{font-size:28px;font-weight:800;}
.soggiorno-notti .l{font-size:12px;opacity:.8;}

/* PAGAMENTO */
.pag-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.pag-row:last-child{border:none;}
.pag-total{font-weight:800;font-size:16px;color:var(--primary);}
.pag-saldo{color:var(--err);font-weight:700;}
.pag-ok{color:var(--ok);font-weight:700;}

/* AZIONI */
.azioni{display:flex;flex-direction:column;gap:10px;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{background:var(--primary-l);}
.btn-secondary{background:#f1f5f9;color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{background:#e2e8f0;}
.btn-danger{background:#fee2e2;color:var(--err);border:1.5px solid #fecaca;}
.btn-danger:hover{background:#fecaca;}
.btn-accent{background:linear-gradient(135deg,#C9A84C,#b8962a);color:white;}
.btn:disabled{opacity:.5;cursor:default;}

/* CHECKIN ONLINE */
.checkin-done{background:#dcfce7;border:1px solid #bbf7d0;border-radius:10px;padding:14px;text-align:center;}
.checkin-done p{font-size:13px;color:#15803d;font-weight:600;}

/* MODAL ANNULLA */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:8px;}
.modal-text{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}

/* RICHIESTA MODIFICA */
.modifica-form{display:none;}
.modifica-form.open{display:block;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;resize:none;height:90px;}
.form-group textarea:focus{border-color:var(--primary);}

/* WHATSAPP CTA */
.wa-cta{background:linear-gradient(135deg,#25D366,#128C7E);color:white;border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;}
.wa-cta p{font-size:13px;opacity:.9;margin-bottom:10px;}
.wa-cta a{display:inline-block;background:white;color:#128C7E;padding:9px 20px;border-radius:8px;font-weight:700;font-size:13px;text-decoration:none;}

/* LOADING / ERROR */
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.error-box{text-align:center;padding:40px 20px;}
.error-box .ico{font-size:48px;margin-bottom:12px;}
.error-box h2{font-size:18px;font-weight:800;color:var(--err);margin-bottom:8px;}
.error-box p{font-size:14px;color:var(--muted);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="root"><div class="loading">⏳ Caricamento prenotazione...</div></div>
<div id="toast" class="toast"></div>
<div id="modal-annulla" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-title">❌ Annulla prenotazione</div>
    <div class="modal-text">Sei sicuro di voler annullare la prenotazione? Questa azione non può essere annullata.<br>Verifica la policy di cancellazione per eventuali rimborsi.</div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="btn-confirm-annulla">Sì, annulla prenotazione</button>
      <button class="btn btn-secondary" onclick="chiudiModal()">No, torna indietro</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://cuhcscpvhypoaplcmtjk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aGNzY3B2aHlwb2FwbGNtdGprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MjY4MjgsImV4cCI6MjA3OTQwMjgyOH0.q9zAs0oh8F1-whtORHBIORF5jIn1NTS3LvSMWleP0a0';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const params = new URLSearchParams(location.search);
const token = params.get('token');
let _pren = null;
let _hotel = null;

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtData(d){ return d ? new Date(d+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '—'; }
function fmtE(n){ return n ? '€ ' + parseFloat(n).toFixed(2).replace('.',',') : '€ 0,00'; }
function toast(msg, dur=3000){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function chiudiModal(){ document.getElementById('modal-annulla').classList.remove('open'); }

// ── Stato badge ───────────────────────────────────────────────────────────
function statoBadge(stato){
  const cfg = {
    'confermata':  { cls:'stato-confermata', ico:'✅', label:'Confermata' },
    'in_attesa':   { cls:'stato-in_attesa',  ico:'⏳', label:'In attesa di conferma' },
    'annullata':   { cls:'stato-annullata',  ico:'❌', label:'Annullata' },
    'checkin':     { cls:'stato-checkin',    ico:'🏨', label:'Ospite in struttura' },
    'checkout':    { cls:'stato-checkout',   ico:'✔️', label:'Checkout effettuato' },
  };
  const c = cfg[stato] || { cls:'stato-in_attesa', ico:'❓', label:stato };
  return `<span class="stato-badge ${c.cls}">${c.ico} ${c.label}</span>`;
}

// ── Carica prenotazione ───────────────────────────────────────────────────
async function carica(){
  if (!token) { renderError('Link non valido', 'Il link che hai usato non è valido o è scaduto.'); return; }

  const { data: pren, error } = await db
    .from('hotel_prenotazioni')
    .select(`*, hotel_camere(id,nome,tipologia,foto_urls)`)
    .eq('token_pubblico', token)
    .maybeSingle();

  if (error || !pren) { renderError('Prenotazione non trovata', 'Non riusciamo a trovare la tua prenotazione. Controlla il link o contatta la struttura.'); return; }
  _pren = pren;

  // Carica dati hotel (azienda)
  const { data: az } = await db.from('aziende').select('nome,logo_url,telefono,email').eq('id', pren.azienda_id).maybeSingle();
  _hotel = az;

  renderGuest(pren, az);
}

// ── Render principale ─────────────────────────────────────────────────────
function renderGuest(p, hotel){
  const camera = p.hotel_camere;
  const notti = p.notti || Math.round((new Date(p.data_checkout) - new Date(p.data_checkin)) / 86400000);
  const totale = parseFloat(p.prezzo_totale || 0);
  const acconto = parseFloat(p.acconto || 0);
  const saldo = parseFloat(p.saldo_residuo || p.saldo_da_pagare || (totale - acconto) || 0);
  const isCancellabile = !['annullata','checkout','checkin'].includes(p.stato);
  const isCheckinFatto = p.checkin_online_completato;
  const oggi = new Date().toISOString().split('T')[0];
  const puoCheckin = p.data_checkin >= oggi && p.stato !== 'annullata' && !isCheckinFatto;

  // Numero hotel per WA
  const tel = hotel?.telefono?.replace(/\D/g,'');
  const waLink = tel ? `https://wa.me/39${tel.replace(/^0/,'')}?text=${encodeURIComponent(`Ciao, sono ${p.ospite_nome} ${p.ospite_cognome} e ho una prenotazione per il ${fmtData(p.data_checkin)}. Avrei bisogno di assistenza.`)}` : null;

  document.getElementById('root').innerHTML = `
  <div class="hero">
    ${hotel?.logo_url ? `<img class="hero-logo" src="${esc(hotel.logo_url)}" alt="${esc(hotel?.nome||'')}">` : `<div style="width:56px;height:56px;background:rgba(255,255,255,.2);border-radius:14px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:28px;">🏨</div>`}
    <h1>${esc(hotel?.nome || 'La tua prenotazione')}</h1>
    <p>Ciao ${esc(p.ospite_nome)}! Ecco i dettagli del tuo soggiorno.</p>
    ${statoBadge(p.stato)}
  </div>

  <div class="container">

    <!-- SOGGIORNO -->
    <div class="card">
      <div class="card-title">🛏️ Soggiorno</div>
      ${camera?.foto_urls?.length ? `<img src="${esc(camera.foto_urls[0])}" alt="${esc(camera?.nome||'')}" style="width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:14px;">` : ''}
      <div class="soggiorno-box">
        <div class="soggiorno-row"><span>Camera</span><span>${esc(camera?.nome||'—')} ${camera?.tipologia?`(${esc(camera.tipologia)})`:''}` </span></div>
        <div class="soggiorno-row"><span>Check-in</span><span>${fmtData(p.data_checkin)}${p.ora_arrivo_prevista?` · ${p.ora_arrivo_prevista.slice(0,5)}`:''}</span></div>
        <div class="soggiorno-row"><span>Check-out</span><span>${fmtData(p.data_checkout)}${p.ora_checkout_prevista?` · ${p.ora_checkout_prevista.slice(0,5)}`:''}</span></div>
        <div class="soggiorno-row"><span>Ospiti</span><span>${p.adulti||1} adult${(p.adulti||1)>1?'i':'o'}${p.bambini?` · ${p.bambini} bambin${p.bambini>1?'i':'o'}`:''}</span></div>
        ${p.colazione_inclusa ? `<div class="soggiorno-row"><span>Colazione</span><span>✅ Inclusa</span></div>` : ''}
        ${p.richieste_speciali ? `<div class="soggiorno-row"><span>Richieste</span><span style="font-size:12px;max-width:60%;text-align:right;">${esc(p.richieste_speciali)}</span></div>` : ''}
        <div class="soggiorno-notti"><div class="n">${notti}</div><div class="l">nott${notti===1?'e':'i'}</div></div>
      </div>
    </div>

    <!-- PAGAMENTO -->
    <div class="card">
      <div class="card-title">💳 Pagamento</div>
      <div class="pag-row"><span>Prezzo per notte</span><span>${fmtE(p.prezzo_notte)}</span></div>
      ${p.prezzo_colazione>0 ? `<div class="pag-row"><span>Colazione (×${notti})</span><span>${fmtE(p.prezzo_colazione)}</span></div>` : ''}
      ${parseFloat(p.sconto_importo||0)>0 ? `<div class="pag-row"><span>Sconto</span><span style="color:var(--ok);">−${fmtE(p.sconto_importo)}</span></div>` : ''}
      <div class="pag-row"><span style="font-weight:700;">Totale</span><span class="pag-total">${fmtE(totale)}</span></div>
      ${acconto>0 ? `<div class="pag-row"><span>Acconto pagato</span><span class="pag-ok">−${fmtE(acconto)}</span></div>` : ''}
      ${saldo>0 ? `<div class="pag-row"><span><strong>Saldo da pagare</strong></span><span class="pag-saldo">${fmtE(saldo)}</span></div>` : `<div class="pag-row"><span>Saldo</span><span class="pag-ok">✅ Pagato</span></div>`}
      ${p.metodo_pagamento ? `<div class="pag-row"><span>Metodo</span><span>${esc(p.metodo_pagamento)}</span></div>` : ''}
    </div>

    <!-- CHECK-IN ONLINE -->
    ${p.stato !== 'annullata' ? `
    <div class="card">
      <div class="card-title">📋 Check-in online</div>
      ${isCheckinFatto ? `
        <div class="checkin-done">
          <p>✅ Check-in online completato il ${new Date(p.checkin_online_at).toLocaleDateString('it-IT')}</p>
        </div>` : puoCheckin ? `
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6;">
          Completa il check-in online prima del tuo arrivo per velocizzare le procedure in struttura.
        </p>
        <a href="https://hotel.ristoflow-ai.com/public/checkin.html?token=${esc(p.checkin_online_token||token)}" class="btn btn-accent">
          📋 Completa check-in online
        </a>` : `
        <p style="font-size:13px;color:var(--muted);">Il check-in online sarà disponibile a partire dalla data del tuo arrivo.</p>`}
    </div>` : ''}

    <!-- WA CONTATTO -->
    ${waLink ? `
    <div class="wa-cta">
      <p>Hai bisogno di assistenza? Scrivici su WhatsApp</p>
      <a href="${waLink}" target="_blank">💬 Contatta la struttura</a>
    </div>` : ''}

    <!-- AZIONI -->
    <div class="card">
      <div class="card-title">⚙️ Gestisci prenotazione</div>
      <div class="azioni">

        <!-- MODIFICA RICHIESTE -->
        <button class="btn btn-secondary" onclick="toggleModifica()">✏️ Modifica richieste speciali</button>
        <div id="modifica-form" class="modifica-form">
          <div class="form-group" style="margin-top:10px;">
            <label>Richieste speciali</label>
            <textarea id="txt-richieste" placeholder="Es. piano alto, letto matrimoniale, allergie...">${esc(p.richieste_speciali||'')}</textarea>
          </div>
          <button class="btn btn-primary" onclick="salvaModifica()">💾 Salva modifiche</button>
        </div>

        <!-- ANNULLA -->
        ${isCancellabile ? `<button class="btn btn-danger" onclick="document.getElementById('modal-annulla').classList.add('open')">❌ Annulla prenotazione</button>` : ''}

        <!-- AGGIUNGI AL CALENDARIO -->
        <a href="${buildICS(p,hotel)}" download="prenotazione-hotel.ics" class="btn btn-secondary">📅 Aggiungi al calendario</a>

      </div>
    </div>

    <div style="text-align:center;padding:20px;font-size:12px;color:var(--muted);">
      ID prenotazione: ${p.id?.slice(0,8).toUpperCase()}<br>
      ${hotel?.email ? `<a href="mailto:${esc(hotel.email)}" style="color:var(--primary);">${esc(hotel.email)}</a>` : ''}
    </div>
  </div>`;

  // Annulla confirm
  document.getElementById('btn-confirm-annulla').onclick = annullaPrenotazione;
}

// ── Toggle modifica ───────────────────────────────────────────────────────
function toggleModifica(){
  const f = document.getElementById('modifica-form');
  f.classList.toggle('open');
}

// ── Salva modifica richieste ──────────────────────────────────────────────
async function salvaModifica(){
  const txt = document.getElementById('txt-richieste').value.trim();
  const { error } = await db.from('hotel_prenotazioni').update({
    richieste_speciali: txt || null,
    modificata_dal_cliente: true,
    modificata_il: new Date().toISOString()
  }).eq('token_pubblico', token);

  if (error) { toast('❌ Errore nel salvataggio'); return; }
  toast('✅ Modifiche salvate!');
  document.getElementById('modifica-form').classList.remove('open');
  _pren.richieste_speciali = txt;
}

// ── Annulla prenotazione ──────────────────────────────────────────────────
async function annullaPrenotazione(){
  chiudiModal();
  const { error } = await db.from('hotel_prenotazioni').update({
    stato: 'annullata',
    motivo_cancellazione: 'Cancellata dal cliente via pagina guest',
    modificata_dal_cliente: true,
    modificata_il: new Date().toISOString()
  }).eq('token_pubblico', token);

  if (error) { toast('❌ Errore nella cancellazione'); return; }
  toast('✅ Prenotazione annullata');
  setTimeout(() => carica(), 1200);
}

// ── Genera ICS per calendario ─────────────────────────────────────────────
function buildICS(p, hotel){
  const dt = s => s.replace(/-/g,'') + 'T120000Z';
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Ristoflow//Hotel//IT',
    'BEGIN:VEVENT',
    `DTSTART;VALUE=DATE:${p.data_checkin.replace(/-/g,'')}`,
    `DTEND;VALUE=DATE:${p.data_checkout.replace(/-/g,'')}`,
    `SUMMARY:Soggiorno ${hotel?.nome||'Hotel'}`,
    `DESCRIPTION:Check-in: ${p.data_checkin}\\nCheck-out: ${p.data_checkout}\\nCamera: ${p.hotel_camere?.nome||''}`,
    `LOCATION:${hotel?.nome||''}`,
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  return 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
}

// ── Error state ───────────────────────────────────────────────────────────
function renderError(titolo, msg){
  document.getElementById('root').innerHTML = `
  <div class="hero"><h1>Oops!</h1></div>
  <div class="container">
    <div class="card">
      <div class="error-box">
        <div class="ico">😕</div>
        <h2>${esc(titolo)}</h2>
        <p>${esc(msg)}</p>
      </div>
    </div>
  </div>`;
}

// ── Avvio ─────────────────────────────────────────────────────────────────
window.toggleModifica = toggleModifica;
window.salvaModifica = salvaModifica;
window.annullaPrenotazione = annullaPrenotazione;
window.chiudiModal = chiudiModal;

carica();
</script>
</body>
</html>
