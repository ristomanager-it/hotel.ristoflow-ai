<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Prenota il tuo soggiorno</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #0E5A7A; --brand-light: #e8f4f8; --radius: 20px; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f6fa; min-height: 100vh; color: #111827; }
    .hero-social { background: #fff; margin-bottom: 0; }
    .social-cover { position: relative; width: 100%; height: 200px; background: var(--brand); overflow: hidden; }
    .social-cover-img { width:100%;height:100%;object-fit:cover;display:block; }
    .social-cover-empty { width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px; }
    .social-cover-overlay { position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.25) 100%);pointer-events:none; }
    .social-profile-row { display:flex;align-items:flex-end;gap:14px;padding:0 16px 14px;margin-top:-36px;position:relative;z-index:2; }
    .social-logo-wrap { width:88px;height:88px;border-radius:50%;border:4px solid #fff;overflow:hidden;background:#e5e7eb;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.15); }
    .social-logo-img { width:100%;height:100%;object-fit:cover;display:block; }
    .social-logo-empty { width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--brand-light); }
    .social-profile-info { padding-bottom:6px;flex:1;min-width:0; }
    .social-nome { font-size:20px;font-weight:800;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .social-sub { font-size:14px;font-weight:700;color:var(--brand);margin-top:4px; }
    /* STEPS */
    .steps-bar { display:flex;align-items:center;background:#fff;padding:12px 16px;border-bottom:1px solid #f3f4f6;gap:4px; }
    .step-item { display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#9ca3af; }
    .step-item.active { color:var(--brand); }
    .step-item.done { color:#059669; }
    .step-num { width:22px;height:22px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0; }
    .step-item.active .step-num { background:var(--brand);color:#fff; }
    .step-item.done .step-num { background:#059669;color:#fff; }
    .step-line { flex:1;height:2px;background:#f3f4f6;min-width:8px; }
    .step-line.done { background:#059669; }
    /* SECTION */
    .section-card { background:#fff;border-radius:18px;margin:0 12px 12px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,0.04); }
    .section-title { font-size:13px;font-weight:800;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:6px; }
    /* DATE */
    .date-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px; }
    .date-box { background:var(--brand-light);border-radius:14px;padding:12px;cursor:pointer;border:2px solid transparent;transition:border-color .15s; }
    .date-box.active { border-color:var(--brand); }
    .date-box-label { font-size:10px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px; }
    .date-box-value { font-size:15px;font-weight:800;color:#111; }
    .date-box-sub { font-size:11px;color:#6b7280;margin-top:2px; }
    /* OSPITI */
    .ospiti-row { display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6; }
    .ospiti-row:last-child { border-bottom:none; }
    .ospiti-label { font-size:14px;font-weight:700;color:#111; }
    .ospiti-sub { font-size:11px;color:#9ca3af; }
    .ospiti-controls { display:flex;align-items:center;gap:12px; }
    .ospiti-btn { width:34px;height:34px;border-radius:50%;border:2px solid var(--brand);background:#fff;color:var(--brand);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .ospiti-btn:disabled { border-color:#e5e7eb;color:#d1d5db;cursor:not-allowed; }
    .ospiti-num { font-size:17px;font-weight:800;min-width:24px;text-align:center; }
    /* CAMERE */
    .camera-card { border:2px solid #e5e7eb;border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden; }
    .camera-card.selected { border-color:var(--brand);background:var(--brand-light); }
    .camera-card.non-disp { opacity:.45;cursor:not-allowed; }
    .camera-foto { width:100%;height:150px;object-fit:cover;border-radius:10px;margin-bottom:10px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden; }
    .camera-foto img { width:100%;height:100%;object-fit:cover; }
    .camera-nome { font-size:16px;font-weight:800;color:#111; }
    .camera-tipo { font-size:12px;color:var(--brand);font-weight:600;margin-top:2px; }
    .camera-desc { font-size:13px;color:#6b7280;margin-top:6px;line-height:1.5; }
    .camera-badges { display:flex;gap:6px;flex-wrap:wrap;margin-top:8px; }
    .camera-badge { background:#f3f4f6;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#374151; }
    .camera-prezzo { font-size:22px;font-weight:800;color:var(--brand);margin-top:10px; }
    .camera-prezzo span { font-size:12px;color:#9ca3af;font-weight:500; }
    .camera-sel { position:absolute;top:10px;right:10px;background:var(--brand);color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;display:none; }
    .camera-card.selected .camera-sel { display:block; }
    /* RIEPILOGO */
    .ries-box { background:var(--brand-light);border-radius:14px;padding:14px;margin-bottom:14px; }
    .ries-row { display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#374151; }
    .ries-row.tot { font-size:18px;font-weight:800;color:#111;border-top:1px solid rgba(0,0,0,.08);padding-top:8px;margin-top:4px;margin-bottom:0; }
    /* FORM */
    .field { margin-bottom:12px; }
    .field label { font-size:12px;font-weight:800;color:#374151;margin-bottom:5px;display:block; }
    .field input,.field select,.field textarea { width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:0 14px;font-size:15px;color:#111;background:#f9fafb;height:46px;font-family:inherit; }
    .field textarea { height:80px;padding:12px 14px;resize:none; }
    .field input:focus,.field select:focus,.field textarea:focus { outline:none;border-color:var(--brand);background:#fff; }
    .field-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    /* PAGAMENTO */
    .pag-card { border:2px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s; }
    .pag-card.selected { border-color:var(--brand);background:var(--brand-light); }
    .pag-card-title { font-size:15px;font-weight:800;color:#111; }
    .pag-card-sub { font-size:13px;color:#6b7280;margin-top:4px;line-height:1.4; }
    .pag-card-importo { font-size:20px;font-weight:800;color:var(--brand);margin-top:8px; }
    /* CTA STICKY */
    .cta-bar { position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08); }
    .cta-inner { display:flex;gap:10px;align-items:center;max-width:480px;margin:0 auto; }
    .cta-info { flex:1; }
    .cta-prezzo { font-size:18px;font-weight:800;color:var(--brand); }
    .cta-label { font-size:11px;color:#9ca3af; }
    .cta-btn { height:48px;border:none;border-radius:14px;background:var(--brand);color:#fff;font-size:15px;font-weight:800;cursor:pointer;padding:0 22px;white-space:nowrap; }
    .cta-btn:disabled { background:#d1d5db;cursor:not-allowed; }
    .btn-ghost { display:block;width:calc(100% - 24px);margin:0 12px 12px;height:48px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;color:#374151;font-size:15px;font-weight:700;cursor:pointer; }
    /* MENU BTN */
    .menu-btn { display:flex;align-items:center;justify-content:center;gap:10px;background:var(--brand);color:#fff;border:none;border-radius:16px;padding:18px;font-size:16px;font-weight:800;width:calc(100% - 24px);margin:0 12px 12px;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(14,90,122,0.25); }
    /* LOADER / ERROR */
    .page-loader { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px; }
    .spinner { width:48px;height:48px;border:4px solid var(--brand-light);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-page { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px;text-align:center;gap:12px; }
    .error-icon { font-size:56px; }
    .error-title { font-size:20px;font-weight:800; }
    .error-sub { font-size:14px;color:#6b7280;max-width:280px; }
    .landing-footer { text-align:center;padding:28px 20px calc(80px + env(safe-area-inset-bottom));font-size:12px;color:#9ca3af;font-weight:600; }
    .landing-footer a { color:var(--brand);text-decoration:none; }
    .info-note { background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:10px 12px;font-size:12px;color:#c2410c;font-weight:600;margin-bottom:12px;line-height:1.5; }
    @media(min-width:480px) {
      body { display:flex;flex-direction:column;align-items:center; }
      .hero-social,.steps-bar,.section-card,.cta-bar,.btn-ghost,.menu-btn,.landing-footer { max-width:480px;width:100%; }
    }
  </style>
</head>
<body>

<div id="root">
  <div class="page-loader"><div class="spinner"></div><div style="font-size:14px;font-weight:700;color:#6b7280;">Caricamento...</div></div>
</div>
<div class="cta-bar" id="cta-bar" style="display:none">
  <div class="cta-inner">
    <div class="cta-info">
      <div class="cta-prezzo" id="cta-prezzo">—</div>
      <div class="cta-label" id="cta-label">Seleziona date</div>
    </div>
    <button class="cta-btn" id="cta-btn" onclick="avanti()">Avanti →</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SUPA_URL = 'https://cuhcscpvhypoaplcmtjk.supabase.co';
  var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aGNzY3B2aHlwb2FwbGNtdGprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MjY4MjgsImV4cCI6MjA3OTQwMjgyOH0.q9zAs0oh8F1-whtORHBIORF5jIn1NTS3LvSMWleP0a0';
  var supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  var params = new URLSearchParams(window.location.search);
  var azId = params.get('az');
  var root = document.getElementById('root');

  var azienda = {}, cfg = {}, camere = [];
  var step = 1;
  var checkin = '', checkout = '', adulti = 2, bambini = 0;
  var camereSelezionate = []; // array per supportare multi-camera
  var modalitaPagamento = 'gratuita'; // gratuita | caparra | totale
  var capPerc = 30;
  // Dati ospite salvati tra step 3 e 4
  var datiOspite = { nome:'', cognome:'', email:'', tel:'', arrivo:'14:00', note:'' };

  if (!azId) { showError('Link non valido','Manca il codice hotel.'); return; }
  init();

  // ═══════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════
  async function init() {
    var oggi = new Date();
    var d1 = new Date(oggi); d1.setDate(d1.getDate()+1);
    var d2 = new Date(oggi); d2.setDate(d2.getDate()+2);
    checkin = toISO(d1); checkout = toISO(d2);

    var [azRes, cfgRes] = await Promise.all([
      supa.from('aziende_pubbliche').select('*').eq('id', azId).maybeSingle(),
      supa.from('hotel_configurazione').select('*').eq('azienda_id', azId).maybeSingle(),
    ]);
    if (!azRes.data) { showError('Hotel non trovato','Il link non è valido.'); return; }
    azienda = azRes.data;
    cfg = cfgRes.data || {};
    modalitaPagamento = cfg.modalita_pagamento || 'gratuita';
    capPerc = cfg.caparra_percentuale || 30;

    // Brand
    if (azienda.colore_brand) {
      document.documentElement.style.setProperty('--brand', azienda.colore_brand);
      document.documentElement.style.setProperty('--brand-light', azienda.colore_brand + '18');
    }
    if (azienda.font_family) {
      var fn = azienda.font_family.replace(/['"]/g,'').split(',')[0].trim().replace(/ /g,'+');
      var lnk = document.createElement('link'); lnk.rel='stylesheet';
      lnk.href = 'https://fonts.googleapis.com/css2?family='+fn+':wght@400;700;800&display=swap';
      document.head.appendChild(lnk);
      document.body.style.fontFamily = azienda.font_family;
    }
    document.title = 'Prenota — ' + (cfg.nome_pubblico || azienda.nome || 'Hotel');
    document.getElementById('cta-bar').style.display = '';
    renderStep1();
  }

  // ═══════════════════════════════════════════════
  // HERO — identico a hotel-prenotazione.html
  // ═══════════════════════════════════════════════
  function buildHero() {
    var nomeH = cfg.nome_pubblico || azienda.nome || 'Hotel';
    var h = '<div class="hero-social"><div class="social-cover">';
    if (azienda.cover_url) h += '<img class="social-cover-img" src="'+escH(azienda.cover_url)+'" alt="">';
    else h += '<div class="social-cover-empty" style="background:var(--brand)">🏨</div>';
    h += '<div class="social-cover-overlay"></div></div>';
    h += '<div class="social-profile-row"><div class="social-logo-wrap">';
    if (azienda.logo_url) h += '<img class="social-logo-img" src="'+escH(azienda.logo_url)+'" alt="Logo">';
    else h += '<div class="social-logo-empty">🏨</div>';
    h += '</div><div class="social-profile-info">';
    h += '<div class="social-nome">'+escH(nomeH)+'</div>';
    h += '<div class="social-sub">🏨 Prenota il tuo soggiorno</div>';
    h += '</div></div></div>';
    return h;
  }

  function buildSteps() {
    var labels = ['Date','Camera','Dati'+(modalitaPagamento!=='gratuita'?' + Pago':''),'✓'];
    var maxStep = modalitaPagamento !== 'gratuita' ? 4 : 3;
    var h = '<div class="steps-bar">';
    for (var i=0; i<maxStep; i++) {
      var n = i+1;
      var cls = n < step ? 'done' : n === step ? 'active' : '';
      h += '<div class="step-item '+cls+'"><div class="step-num">'+(n<step?'✓':n)+'</div>'+(i<maxStep-1?labels[i]:'')+'</div>';
      if (i < maxStep-1) h += '<div class="step-line'+(n<step?' done':'')+'"></div>';
    }
    h += '</div>';
    return h;
  }

  // ═══════════════════════════════════════════════
  // STEP 1 — Date e ospiti
  // ═══════════════════════════════════════════════
  function renderStep1() {
    step = 1;
    aggiornaCtaStep1();
    var h = buildHero() + buildSteps();
    h += '<div class="section-card"><div class="section-title">📅 Quando vuoi soggiornare?</div>';
    h += '<div class="date-grid">';
    h += '<div class="date-box active" id="box-ci"><div class="date-box-label">Check-in</div><div class="date-box-value" id="val-ci">'+fmtData(checkin)+'</div><div class="date-box-sub">'+fmtDay(checkin)+'</div></div>';
    h += '<div class="date-box" id="box-co"><div class="date-box-label">Check-out</div><div class="date-box-value" id="val-co">'+fmtData(checkout)+'</div><div class="date-box-sub">'+fmtDay(checkout)+'</div></div>';
    h += '</div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>Check-in</label><input type="date" id="inp-ci" value="'+checkin+'" min="'+toISO(new Date())+'"></div>';
    h += '<div class="field"><label>Check-out</label><input type="date" id="inp-co" value="'+checkout+'"></div>';
    h += '</div></div>';
    h += '<div class="section-card"><div class="section-title">👥 Quanti ospiti?</div>';
    h += '<div class="ospiti-row"><div><div class="ospiti-label">Adulti</div><div class="ospiti-sub">13+ anni</div></div>';
    h += '<div class="ospiti-controls"><button class="ospiti-btn" id="ad-min" onclick="chOsp(\'adulti\',-1)">−</button><span class="ospiti-num" id="n-ad">'+adulti+'</span><button class="ospiti-btn" onclick="chOsp(\'adulti\',1)">+</button></div></div>';
    h += '<div class="ospiti-row"><div><div class="ospiti-label">Bambini</div><div class="ospiti-sub">0-12 anni</div></div>';
    h += '<div class="ospiti-controls"><button class="ospiti-btn" id="bam-min" onclick="chOsp(\'bambini\',-1)">−</button><span class="ospiti-num" id="n-bam">'+bambini+'</span><button class="ospiti-btn" onclick="chOsp(\'bambini\',1)">+</button></div></div>';
    h += '</div>';
    h += '<div class="landing-footer">Powered by <a href="https://ristoflow-ai.com">Ristoflow Hotel</a></div>';
    root.innerHTML = h;

    document.getElementById('inp-ci').addEventListener('change', function(e){
      checkin = e.target.value;
      document.getElementById('val-ci').textContent = fmtData(checkin);
      document.getElementById('box-ci').querySelector('.date-box-sub').textContent = fmtDay(checkin);
      if (checkout <= checkin) {
        var d = new Date(checkin); d.setDate(d.getDate()+1); checkout = toISO(d);
        document.getElementById('inp-co').value = checkout;
        document.getElementById('val-co').textContent = fmtData(checkout);
        document.getElementById('box-co').querySelector('.date-box-sub').textContent = fmtDay(checkout);
      }
      aggiornaCtaStep1();
    });
    document.getElementById('inp-co').addEventListener('change', function(e){
      checkout = e.target.value;
      document.getElementById('val-co').textContent = fmtData(checkout);
      document.getElementById('box-co').querySelector('.date-box-sub').textContent = fmtDay(checkout);
      aggiornaCtaStep1();
    });
    document.getElementById('ad-min').disabled = adulti <= 1;
    document.getElementById('bam-min').disabled = bambini <= 0;
  }

  window.chOsp = function(tipo, delta) {
    if (tipo==='adulti') { adulti=Math.max(1,adulti+delta); document.getElementById('n-ad').textContent=adulti; document.getElementById('ad-min').disabled=adulti<=1; }
    else { bambini=Math.max(0,bambini+delta); document.getElementById('n-bam').textContent=bambini; document.getElementById('bam-min').disabled=bambini<=0; }
    aggiornaCtaStep1();
  };

  function aggiornaCtaStep1() {
    var n = notti(); var el = document.getElementById('cta-label');
    if (el) el.textContent = n>0 ? n+' nott'+(n===1?'e':'i')+' · '+adulti+' adult'+(adulti===1?'o':'i') : 'Seleziona date valide';
    var ep = document.getElementById('cta-prezzo'); if(ep) ep.textContent = n>0 ? 'Cerca camere' : '—';
  }

  // ═══════════════════════════════════════════════
  // STEP 2 — Selezione camera (multi-camera)
  // ═══════════════════════════════════════════════
  async function renderStep2() {
    step = 2;
    root.innerHTML = buildHero() + buildSteps() + '<div class="page-loader" style="min-height:200px"><div class="spinner"></div><div style="font-size:13px;color:#6b7280">Verifico disponibilità...</div></div>';

    var nn = notti();
    var ospTot = adulti + bambini;

    // Carica camere attive
    var { data: db } = await supa.from('hotel_camere').select('*').eq('azienda_id', azId).eq('attiva', true).order('prezzo_base');
    camere = db || [];

    // Prenotazioni sovrappanti
    var { data: prenDB } = await supa.from('hotel_prenotazioni')
      .select('camera_id').eq('azienda_id', azId)
      .not('stato','in','(cancellata,noshow)')
      .lt('data_checkin', checkout).gt('data_checkout', checkin);
    var occupate = new Set((prenDB||[]).map(function(p){ return p.camera_id; }));

    // Rimuovi camere già selezionate dall'utente (per multi-camera)
    var selIds = new Set(camereSelezionate.map(function(c){ return c.id; }));

    var h = buildHero() + buildSteps();

    // Banner ospiti rimasti
    var ospAssegnati = camereSelezionate.reduce(function(s,c){ return s+(c.ospiti_max||1); },0);
    var ospRimasti = ospTot - ospAssegnati;

    if (camereSelezionate.length > 0) {
      h += '<div class="section-card">';
      h += '<div class="section-title">✅ Camere selezionate</div>';
      camereSelezionate.forEach(function(c,i){
        h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;">';
        h += '<div><div style="font-size:14px;font-weight:700">'+escH(c.nome)+'</div><div style="font-size:12px;color:#6b7280">€'+parseFloat(c.prezzo_base||0).toFixed(2)+'/notte · max '+c.ospiti_max+' ospiti</div></div>';
        h += '<button onclick="rimuoviCamera('+i+')" style="border:none;background:#fee2e2;color:#991b1b;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;">Rimuovi</button>';
        h += '</div>';
      });
      if (ospRimasti > 0) {
        h += '<div class="info-note" style="margin-top:10px;margin-bottom:0">👥 Hai ancora <strong>'+ospRimasti+' ospiti</strong> senza camera. Aggiungi un\'altra camera.</div>';
      }
      h += '</div>';
    }

    if (ospRimasti > 0 || camereSelezionate.length === 0) {
      h += '<div class="section-card"><div class="section-title">🛏️ '+(camereSelezionate.length>0?'Aggiungi un\'altra camera':'Scegli la camera')+'</div>';
      h += '<div style="font-size:13px;color:#6b7280;margin-bottom:12px">📅 '+fmtData(checkin)+' → '+fmtData(checkout)+' · '+nn+' nott'+(nn===1?'e':'i')+'</div>';

      if (!camere.length) {
        h += '<div style="text-align:center;padding:30px;color:#9ca3af">Nessuna camera disponibile per queste date.</div>';
      } else {
        camere.forEach(function(c){
          if (selIds.has(c.id)) return; // già selezionata
          var disp = !occupate.has(c.id);
          var prezzoTot = parseFloat(c.prezzo_base||0) * nn;
          var foto = (c.foto_urls && c.foto_urls.length>0) ? c.foto_urls[0] : null;
          h += '<div class="camera-card'+(disp?'':' non-disp')+'" id="cc-'+c.id+'" onclick="'+(disp?'aggiungiCamera(\''+c.id+'\')':'')+'">';
          h += '<div class="camera-sel">✅ Selezionata</div>';
          h += '<div class="camera-foto">'+(foto?'<img src="'+escH(foto)+'" alt="">':'🛏️')+'</div>';
          h += '<div class="camera-nome">'+escH(c.nome)+'</div>';
          if (c.tipologia) h += '<div class="camera-tipo">'+escH(c.tipologia)+'</div>';
          if (c.descrizione) h += '<div class="camera-desc">'+escH(c.descrizione.substring(0,120))+(c.descrizione.length>120?'...':'')+'</div>';
          h += '<div class="camera-badges">';
          if (c.ospiti_max) h += '<span class="camera-badge">👥 Max '+c.ospiti_max+'</span>';
          if (c.mq) h += '<span class="camera-badge">📐 '+c.mq+' m²</span>';
          if (!disp) h += '<span class="camera-badge" style="background:#fee2e2;color:#991b1b">❌ Non disp.</span>';
          h += '</div>';
          h += '<div class="camera-prezzo">€ '+prezzoTot.toFixed(2)+' <span>tot. · €'+parseFloat(c.prezzo_base||0).toFixed(2)+'/notte</span></div>';
          h += '</div>';
        });
      }
      h += '</div>';
    }

    h += '<button class="btn-ghost" onclick="renderStep1()">← Modifica date e ospiti</button>';
    h += '<div class="landing-footer">Powered by <a href="https://ristoflow-ai.com">Ristoflow Hotel</a></div>';
    root.innerHTML = h;
    aggiornaCtaStep2();
  }

  window.aggiungiCamera = function(id) {
    var c = camere.find(function(x){ return x.id===id; });
    if (!c) return;
    camereSelezionate.push(c);
    renderStep2();
  };

  window.rimuoviCamera = function(idx) {
    camereSelezionate.splice(idx,1);
    renderStep2();
  };

  function aggiornaCtaStep2() {
    var nn = notti();
    var tot = camereSelezionate.reduce(function(s,c){ return s+parseFloat(c.prezzo_base||0)*nn; },0);
    var ospTot = adulti+bambini;
    var ospAss = camereSelezionate.reduce(function(s,c){ return s+(c.ospiti_max||1); },0);
    var ep = document.getElementById('cta-prezzo');
    var el = document.getElementById('cta-label');
    var btn = document.getElementById('cta-btn');
    if (camereSelezionate.length===0) {
      if(ep) ep.textContent='Scegli camera';
      if(el) el.textContent='';
      if(btn) btn.disabled=true;
    } else {
      if(ep) ep.textContent='€ '+tot.toFixed(2);
      if(el) el.textContent=camereSelezionate.length+' camera'+(camereSelezionate.length>1?'e':'')+' · '+nn+' nott'+(nn===1?'e':'i');
      if(btn) btn.disabled = ospAss < ospTot;
      if(btn && ospAss < ospTot) btn.textContent = 'Aggiungi camera →';
      else if(btn) btn.textContent = 'Continua →';
    }
  }

  // ═══════════════════════════════════════════════
  // STEP 3 — Dati ospite
  // ═══════════════════════════════════════════════
  function renderStep3() {
    step = 3;
    var nn = notti();
    var tot = totaleSelezionato();
    var h = buildHero() + buildSteps();

    // Riepilogo
    h += '<div class="section-card"><div class="section-title">📋 Riepilogo prenotazione</div>';
    h += '<div class="ries-box">';
    camereSelezionate.forEach(function(c){
      h += '<div class="ries-row"><span>🛏️ '+escH(c.nome)+'</span><span>€'+parseFloat(c.prezzo_base||0).toFixed(2)+'/notte</span></div>';
    });
    h += '<div class="ries-row"><span>📅 '+fmtData(checkin)+' → '+fmtData(checkout)+'</span><span>'+nn+' nott'+(nn===1?'e':'i')+'</span></div>';
    h += '<div class="ries-row"><span>👥 Ospiti</span><span>'+adulti+' adult'+(adulti===1?'o':'i')+(bambini>0?' + '+bambini+' bamb'+(bambini===1?'ino':'ini'):'')+'</span></div>';
    h += '<div class="ries-row tot"><span>Totale soggiorno</span><span>€ '+tot.toFixed(2)+'</span></div>';
    h += '</div></div>';

    // Dati ospite
    h += '<div class="section-card"><div class="section-title">👤 I tuoi dati</div>';
    h += '<div class="field-row"><div class="field"><label>Nome *</label><input id="f-nome" value="'+escH(datiOspite.nome)+'" placeholder="Mario" autocomplete="given-name"></div>';
    h += '<div class="field"><label>Cognome *</label><input id="f-cognome" value="'+escH(datiOspite.cognome)+'" placeholder="Rossi" autocomplete="family-name"></div></div>';
    h += '<div class="field"><label>Email *</label><input type="email" id="f-email" value="'+escH(datiOspite.email)+'" placeholder="mario@email.it" autocomplete="email"></div>';
    h += '<div class="field"><label>Telefono</label><input type="tel" id="f-tel" value="'+escH(datiOspite.tel)+'" placeholder="+39 333 1234567" autocomplete="tel"></div>';
    h += '<div class="field"><label>Orario arrivo previsto</label><input type="time" id="f-arrivo" value="'+escH(datiOspite.arrivo||'14:00')+'"></div>';
    h += '<div class="field"><label>Richieste speciali</label><textarea id="f-note" placeholder="Allergie, preferenze, esigenze particolari...">'+escH(datiOspite.note)+'</textarea></div>';
    h += '</div>';

    h += '<button class="btn-ghost" onclick="renderStep2()">← Cambia camera</button>';
    h += '<div class="landing-footer">Powered by <a href="https://ristoflow-ai.com">Ristoflow Hotel</a></div>';
    root.innerHTML = h;

    var ep = document.getElementById('cta-prezzo'); if(ep) ep.textContent = '€ '+tot.toFixed(2);
    var el = document.getElementById('cta-label'); if(el) el.textContent = camereSelezionate.map(function(c){return c.nome;}).join(' + ');
    var btn = document.getElementById('cta-btn');
    if (btn) {
      if (modalitaPagamento !== 'gratuita') btn.textContent = 'Continua al pagamento →';
      else btn.textContent = 'Conferma prenotazione →';
      btn.disabled = false;
    }
  }

  // ═══════════════════════════════════════════════
  // STEP 4 — Pagamento (se richiesto)
  // ═══════════════════════════════════════════════
  function renderStep4() {
    step = 4;
    var tot = totaleSelezionato();
    var caparra = modalitaPagamento==='caparra' ? Math.round(tot * capPerc / 100 * 100)/100 : tot;
    var h = buildHero() + buildSteps();

    h += '<div class="section-card"><div class="section-title">💳 Modalità di pagamento</div>';

    if (modalitaPagamento === 'caparra') {
      h += '<div class="pag-card selected" id="pc-cap">';
      h += '<div class="pag-card-title">💳 Caparra '+capPerc+'%</div>';
      h += '<div class="pag-card-sub">Paga ora la caparra e il resto al check-in.</div>';
      h += '<div class="pag-card-importo">€ '+caparra.toFixed(2)+' <span style="font-size:13px;color:#9ca3af;font-weight:500">da pagare ora</span></div>';
      h += '<div style="font-size:12px;color:#6b7280;margin-top:6px">Saldo all\'arrivo: €'+(tot-caparra).toFixed(2)+'</div>';
      h += '</div>';
    } else if (modalitaPagamento === 'totale') {
      h += '<div class="pag-card selected">';
      h += '<div class="pag-card-title">💳 Pagamento totale'+(cfg.pagamento_non_rimborsabile?' — Non rimborsabile':'')+'</div>';
      h += '<div class="pag-card-sub">'+(cfg.pagamento_non_rimborsabile?'Pagamento non rimborsabile. La prenotazione sarà confermata subito.':'Paga il totale ora per confermare la prenotazione.')+'</div>';
      h += '<div class="pag-card-importo">€ '+tot.toFixed(2)+'</div>';
      h += '</div>';
    }

    h += '<div id="stripe-element-wrap" style="margin-top:14px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:12px;padding:14px;">';
    h += '<div id="stripe-element"></div>';
    h += '</div>';
    h += '<div id="stripe-error" style="color:#991b1b;font-size:13px;margin-top:8px;display:none;"></div>';
    h += '</div>';
    h += '<button class="btn-ghost" onclick="renderStep3()">← Torna ai dati</button>';
    h += '<div class="landing-footer">Powered by <a href="https://ristoflow-ai.com">Ristoflow Hotel</a></div>';
    root.innerHTML = h;

    var btn = document.getElementById('cta-btn');
    if (btn) { btn.textContent = '💳 Paga €'+caparra.toFixed(2); btn.disabled = false; }
    var ep = document.getElementById('cta-prezzo'); if(ep) ep.textContent = '€ '+caparra.toFixed(2);
    var el = document.getElementById('cta-label'); if(el) el.textContent = modalitaPagamento==='caparra'?'Caparra '+capPerc+'%':'Totale';

    // Carica Stripe
    if (azienda.stripe_attivo && azienda.stripe_publishable_key) {
      initStripe(caparra);
    } else {
      document.getElementById('stripe-element-wrap').innerHTML = '<div style="text-align:center;padding:20px;color:#9ca3af;font-size:13px">Pagamento online non disponibile — verrai contattato dall\'hotel.</div>';
    }
  }

  var stripeInstance = null, stripeElements = null, cardEl = null;
  function initStripe(importo) {
    if (!window.Stripe) {
      var s = document.createElement('script'); s.src='https://js.stripe.com/v3/';
      s.onload = function(){ initStripeCard(importo); };
      document.head.appendChild(s);
    } else { initStripeCard(importo); }
  }

  function initStripeCard(importo) {
    stripeInstance = Stripe(azienda.stripe_publishable_key);
    stripeElements = stripeInstance.elements();
    cardEl = stripeElements.create('card', { hidePostalCode: true, style: { base: { fontSize:'16px', color:'#111827', fontFamily:'system-ui,sans-serif' }}});
    cardEl.mount('#stripe-element');
    cardEl.on('change', function(e){
      var err = document.getElementById('stripe-error');
      if (err) { err.textContent = e.error?e.error.message:''; err.style.display = e.error?'':'none'; }
    });
  }

  // ═══════════════════════════════════════════════
  // CONFERMA PRENOTAZIONE
  // ═══════════════════════════════════════════════
  async function conferma() {
    // Leggi da datiOspite (salvati allo step 3) o dal DOM se ancora visibile
    var nome    = datiOspite.nome    || (document.getElementById('f-nome')||{}).value?.trim() || '';
    var cognome = datiOspite.cognome || (document.getElementById('f-cognome')||{}).value?.trim() || '';
    var email   = datiOspite.email   || (document.getElementById('f-email')||{}).value?.trim() || '';
    var tel     = datiOspite.tel     || (document.getElementById('f-tel')||{}).value?.trim() || '';
    var arrivo  = datiOspite.arrivo  || (document.getElementById('f-arrivo')||{}).value || '14:00';
    var note    = datiOspite.note    || (document.getElementById('f-note')||{}).value?.trim() || '';

    if (!nome || !cognome || !email) { alert('Compila nome, cognome ed email.'); return; }

    var btn = document.getElementById('cta-btn');
    btn.disabled = true; btn.textContent = 'Conferma in corso...';

    var nn = notti();
    var tot = totaleSelezionato();
    var stato = modalitaPagamento !== 'gratuita' ? 'in_attesa_pagamento' : 'confermata';

    try {
      // Crea prenotazione per ogni camera selezionata
      var tokens = [];
      for (var i=0; i<camereSelezionate.length; i++) {
        var c = camereSelezionate[i];
        var tok = 'bk-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7)+'-'+i;
        tokens.push(tok);
        var prezCam = parseFloat(c.prezzo_base||0)*nn;
        var { error } = await supa.from('hotel_prenotazioni').insert({
          azienda_id:          azId,
          camera_id:           c.id,
          ospite_nome:         nome,
          ospite_cognome:      cognome,
          ospite_email:        email,
          ospite_telefono:     tel||null,
          data_checkin:        checkin,
          data_checkout:       checkout,
          adulti:              adulti,
          bambini:             bambini,
          stato:               stato,
          canale:              'online',
          prezzo_notte:        parseFloat(c.prezzo_base||0),
          prezzo_totale:       prezCam,
          acconto:             modalitaPagamento === 'gratuita' ? 0 : null,
          saldo_residuo:       modalitaPagamento === 'gratuita' ? prezCam : null,
          stato_pagamento:     modalitaPagamento === 'gratuita' ? 'non_pagato' : 'in_attesa',
          richieste_speciali:  note||null,
          ora_arrivo_prevista: arrivo||null,
          token_pubblico:      tok,
          reminder_checkin_inviato:  false,
          reminder_checkout_inviato: false,
          post_checkout_inviato:     false,
        });
        if (error) throw error;
      }

      // Pagamento Stripe
      if (modalitaPagamento !== 'gratuita' && stripeInstance && cardEl) {
        // Stripe payment intent via Edge Function
        var caparra = modalitaPagamento==='caparra' ? Math.round(tot*capPerc/100*100)/100 : tot;
        var piRes = await supa.functions.invoke('hotel-crea-payment-intent', {
          body: { azienda_id: azId, importo: caparra, token: tokens[0], ospite: nome+' '+cognome }
        });
        if (piRes.error) throw new Error(piRes.error.message || 'Errore pagamento');
        var clientSecret = piRes.data?.client_secret;
        if (!clientSecret) throw new Error('Errore creazione pagamento');
        var { error: strErr, paymentIntent } = await stripeInstance.confirmCardPayment(clientSecret, {
          payment_method: { card: cardEl, billing_details: { name: nome+' '+cognome, email: email } }
        });
        if (strErr) throw new Error(strErr.message);
        // Aggiorna stato prenotazione
        for (var j=0; j<tokens.length; j++) {
          // Calcola importo pagato per questa camera
          var importoCam = parseFloat(camereSelezionate[j]?.prezzo_base || 0) * notti();
          var accontoCam = modalitaPagamento === 'caparra' 
            ? Math.round(importoCam * capPerc / 100 * 100) / 100 
            : importoCam;
          var saldoCam = importoCam - accontoCam;
          
          await supa.from('hotel_prenotazioni').update({ 
            stato: 'confermata', 
            stato_pagamento: saldoCam > 0 ? 'acconto_pagato' : 'pagato',
            acconto: accontoCam,
            saldo_residuo: saldoCam,
            stripe_payment_intent_id: paymentIntent?.id || null,
          }).eq('token_pubblico', tokens[j]);
        }
      }

      renderSuccesso(nome, tokens[0]);
    } catch(e) {
      btn.disabled = false;
      btn.textContent = modalitaPagamento!=='gratuita'?'💳 Riprova':'Conferma prenotazione →';
      alert('Errore: '+(e.message||'Riprova o contattaci.'));
    }
  }

  // ═══════════════════════════════════════════════
  // SUCCESSO
  // ═══════════════════════════════════════════════
  function renderSuccesso(nome, token) {
    document.getElementById('cta-bar').style.display='none';
    var linkPren = 'https://hotel.ristoflow-ai.com/hotel-prenotazione.html?t='+token;
    var h = buildHero();
    h += '<div class="section-card" style="text-align:center;padding:32px 16px;">';
    h += '<div style="font-size:64px;margin-bottom:16px">🎉</div>';
    h += '<div style="font-size:24px;font-weight:800;margin-bottom:8px">Prenotazione confermata!</div>';
    h += '<div style="font-size:15px;color:#6b7280;line-height:1.6;margin-bottom:24px">Grazie '+escH(nome)+'!<br>Ti abbiamo inviato la conferma via email.</div>';
    h += '<a class="menu-btn" href="'+linkPren+'">📋 Visualizza la prenotazione</a>';
    if (camereSelezionate.length > 1) {
      h += '<div style="font-size:13px;color:#6b7280;margin-top:8px">Hai prenotato '+camereSelezionate.length+' camere. Riceverai una email per ciascuna.</div>';
    }
    h += '</div>';
    h += '<div class="landing-footer">Powered by <a href="https://ristoflow-ai.com">Ristoflow Hotel</a></div>';
    root.innerHTML = h;
  }

  // ═══════════════════════════════════════════════
  // NAVIGAZIONE
  // ═══════════════════════════════════════════════
  window.avanti = async function() {
    var btn = document.getElementById('cta-btn');
    if (step===1) {
      if (!checkin||!checkout||checkout<=checkin) { alert('Seleziona date valide.'); return; }
      await renderStep2();
    } else if (step===2) {
      if (!camereSelezionate.length) { alert('Seleziona almeno una camera.'); return; }
      var ospTot=adulti+bambini;
      var ospAss=camereSelezionate.reduce(function(s,c){return s+(c.ospiti_max||1);},0);
      if (ospAss<ospTot) { alert('Aggiungi un\'altra camera per tutti gli ospiti.'); return; }
      renderStep3();
    } else if (step===3) {
      // Salva dati ospite nelle variabili
      datiOspite.nome    = document.getElementById('f-nome')?.value?.trim() || '';
      datiOspite.cognome = document.getElementById('f-cognome')?.value?.trim() || '';
      datiOspite.email   = document.getElementById('f-email')?.value?.trim() || '';
      datiOspite.tel     = document.getElementById('f-tel')?.value?.trim() || '';
      datiOspite.arrivo  = document.getElementById('f-arrivo')?.value || '14:00';
      datiOspite.note    = document.getElementById('f-note')?.value?.trim() || '';
      if (!datiOspite.nome || !datiOspite.cognome || !datiOspite.email) {
        alert('Compila nome, cognome ed email per continuare.');
        return;
      }
      if (modalitaPagamento!=='gratuita') renderStep4();
      else await conferma();
    } else if (step===4) {
      await conferma();
    }
  };

  // ═══════════════════════════════════════════════
  // UTILS
  // ═══════════════════════════════════════════════
  function notti() { if(!checkin||!checkout) return 0; return Math.max(0,Math.round((new Date(checkout)-new Date(checkin))/86400000)); }
  function totaleSelezionato() { return camereSelezionate.reduce(function(s,c){return s+parseFloat(c.prezzo_base||0)*notti();},0); }
  function toISO(d) { return d.toISOString().slice(0,10); }
  function fmtData(d) { if(!d) return '--'; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  function fmtDay(d) { if(!d) return ''; var g=['Dom','Lun','Mar','Mer','Gio','Ven','Sab']; var p=d.split('-').map(Number); return g[new Date(p[0],p[1]-1,p[2]).getDay()]; }
  function escH(v) { return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
  function showError(t,s) { root.innerHTML='<div class="error-page"><div class="error-icon">😟</div><div class="error-title">'+escH(t)+'</div><div class="error-sub">'+escH(s)+'</div></div>'; }

})();
</script>
</body>
